name: Deploy vertex-ai-backend

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - .dockerignore
      - backend/**
      - .github/workflows/vertex-ai-backend-AutoDeployTrigger-7efd5e31-e9ba-4ba6-9c1a-393243c2f310.yml
  workflow_dispatch:

env:
  CONTAINER_APP_NAME: vertex-ai-backend
  RESOURCE_GROUP: vertex-ai-rg
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/vertex-ai-backend:${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.VERTEXAIBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.VERTEXAIBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.VERTEXAIBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy image to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          imageToDeploy: ${{ env.IMAGE_NAME }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
